<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spacing — Duangkeaw Jewelry DS</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; padding:24px; font-family:"Segoe UI","Sarabun",system-ui,sans-serif; background:#f7f7f7; color:#393939; }
  .head { margin:0 0 4px; font-size:20px; font-weight:700; color:#921313; }
  .sub { margin:0 0 20px; font-size:13px; color:#777; }
  .card { background:#fff; border:1px solid #e0e0e0; border-radius:8px; box-shadow:rgba(0,0,0,.06) 0 2px 8px; padding:20px; }
  .row { display:flex; align-items:center; gap:16px; padding:9px 0; }
  .token { width:150px; flex-shrink:0; font-size:12px; font-family:ui-monospace,monospace; color:#888; }
  .bar { height:18px; background:#921313; border-radius:3px; }
  .val { font-size:12px; color:#aaa; width:48px; text-align:right; }
  .use { font-size:11px; color:#999; }
</style>
</head>
<body>
  <h1 class="head">Spacing Scale</h1>
  <p class="sub">จังหวะ 4 / 8 / 12 / 16 / 20 / 24 px · ใช้ var(--sp-*) เท่านั้น ห้าม hardcode px</p>
  <div class="card">
    <div class="row"><span class="token">--sp-xs</span><span class="bar" style="width:4px;"></span><span class="val">4px</span><span class="use">gap เล็กสุด</span></div>
    <div class="row"><span class="token">--sp-sm</span><span class="bar" style="width:8px;"></span><span class="val">8px</span><span class="use">gap ภายใน control</span></div>
    <div class="row"><span class="token">--sp-md</span><span class="bar" style="width:12px;"></span><span class="val">12px</span><span class="use">padding input</span></div>
    <div class="row"><span class="token">--sp-lg</span><span class="bar" style="width:16px;"></span><span class="val">16px</span><span class="use">เว้นระหว่าง field / ระหว่าง box</span></div>
    <div class="row"><span class="token">--sp-xl</span><span class="bar" style="width:20px;"></span><span class="val">20px</span><span class="use">padding ภายใน card</span></div>
    <div class="row"><span class="token">--sp-2xl</span><span class="bar" style="width:24px;"></span><span class="val">24px</span><span class="use">เว้น section ใหญ่</span></div>
  </div>
</body>
</html>
