<!-- @dsCard group="Explore · SearchBar" -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SearchBar — แบบ C · Final (filled main header)</title>
<style>
  :root{
    --primary:#921313; --teal:#038387; --teal-bg:#e6f4f4;
    --border:#e0e0e0; --muted:#888; --radius:8px;
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:24px;background:#f7f7f7;font-family:"Segoe UI","Sarabun",system-ui,sans-serif;color:#333;}
  .tag{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:12px;}
  .tag b{color:var(--primary);}

  .card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:rgba(0,0,0,.06) 0 2px 8px;overflow:hidden;}
  /* header zone: พื้นสี main + ตัวอักษรขาว (ไม่มี icon chip) */
  .hd{background:var(--primary);padding:14px 18px;}
  .hd .title{font-size:18px;font-weight:700;color:#fff;margin:0;line-height:1.25;}
  .hd .desc{font-size:12px;color:rgba(255,255,255,.82);margin:2px 0 0;}

  .body{padding:20px;}
  .fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;}
  label{display:block;font-size:12px;color:#555;margin-bottom:6px;font-weight:500;}
  .inp{width:100%;height:38px;border:1px solid var(--border);border-radius:var(--radius);padding:0 10px;font-size:13px;color:#333;display:flex;align-items:center;gap:6px;background:#fff;}
  .inp.focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(146,19,19,.08);}
  .inp .ico{color:var(--muted);}
  .range{display:flex;align-items:center;gap:8px;} .range .inp{flex:1;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{background:var(--teal-bg);color:var(--teal);border-radius:20px;padding:3px 10px;font-size:12px;}

  .bar{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0;}
  .seg{display:inline-flex;gap:4px;background:#f7f7f7;border-radius:10px;padding:4px;}
  .ib{width:34px;height:34px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;background:transparent;color:#666;border:none;}
  .ib:hover{background:#ececec;}
  .ib.exp{color:var(--teal);}
  .primary{height:40px;padding:0 16px;border-radius:8px;background:var(--primary);color:#fff;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:none;}
</style>
</head>
<body>
  <div class="tag">แบบ <b>C · Final</b> — header พื้น main ตัวอักษรขาว (ไม่มี icon) + action จัดกลุ่ม</div>
  <div class="card">
    <div class="hd">
      <p class="title">ติดตามใบสั่งผลิต</p>
      <p class="desc">ค้นหาและติดตามสถานะใบสั่งผลิตทั้งหมด</p>
    </div>
    <div class="body">
      <div class="fields">
        <div>
          <label>วันที่สร้าง</label>
          <div class="range">
            <div class="inp"><span class="ico">📅</span> เริ่ม</div><span style="color:var(--muted)">→</span>
            <div class="inp"><span class="ico">📅</span> สิ้นสุด</div>
          </div>
        </div>
        <div>
          <label>เลขใบสั่งงาน</label>
          <div class="inp focus"><span class="ico">▥</span> EX: 202502211</div>
        </div>
        <div>
          <label>สถานะแผน</label>
          <div class="inp"><div class="chips"><span class="chip">กำลังผลิต ✕</span><span class="chip">รอจ่าย ✕</span></div></div>
        </div>
      </div>
      <div class="bar">
        <span class="seg">
          <span class="ib" title="ค้นหาเพิ่มเติม">🔎</span>
          <span class="ib" title="ล้าง">✖</span>
          <span class="ib exp" title="Export CSV">⬇</span>
        </span>
        <span class="primary" title="ค้นหา">🔍 ค้นหา</span>
      </div>
    </div>
  </div>
</body>
</html>
