<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ButtonGeneric — Duangkeaw Jewelry DS</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; padding:24px; font-family:"Segoe UI","Sarabun",system-ui,sans-serif; background:#f7f7f7; color:#393939; }
  .head { margin:0 0 4px; font-size:20px; font-weight:700; color:#921313; }
  .sub { margin:0 0 18px; font-size:13px; color:#777; }
  .card { background:#fff; border:1px solid #e0e0e0; border-radius:8px; box-shadow:rgba(0,0,0,.06) 0 2px 8px; padding:20px; margin-bottom:16px; }
  .label { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#999; margin-bottom:12px; }
  .grid { display:grid; grid-template-columns: 120px repeat(3, 1fr); gap:12px 16px; align-items:center; }
  .grid .col-h { font-size:11px; color:#aaa; text-transform:uppercase; letter-spacing:.04em; }
  .rowname { font-size:12px; font-family:ui-monospace,monospace; color:#888; }

  .btn { display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600;
         padding:7px 14px; border-radius:8px; border:1px solid transparent; cursor:pointer;
         font-family:inherit; line-height:1.4; }
  .btn i { font-style:normal; }
  .main { background:#921313; color:#fff; }
  .main.hover { background:#7d1010; }
  .outline { background:#fff; color:#921313; border-color:#921313; }
  .outline.hover { background:#fdf2f2; }
  .green { background:#038387; color:#fff; }
  .green.hover { background:#02686b; }
  .red { background:#ff4d4d; color:#fff; }
  .red.hover { background:#f53030; }
  .dark { background:#393939; color:#fff; }
  .dark.hover { background:#2b2b2b; }
  .disabled { opacity:.5; cursor:not-allowed; }
  .spin { width:13px; height:13px; border:2px solid rgba(255,255,255,.5); border-top-color:#fff; border-radius:50%; display:inline-block; animation:sp .7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }
  .icononly { padding:7px; width:34px; height:34px; justify-content:center; }
  .iconrow { display:flex; gap:10px; align-items:center; }
  .tip { font-size:11px; color:#aaa; margin-top:10px; }
</style>
</head>
<body>
  <h1 class="head">ButtonGeneric</h1>
  <p class="sub">6 variants · ปุ่มมาตรฐานแทน &lt;button&gt; · primary = บันทึก/ยืนยัน, green = view/search, red = ลบ</p>

  <div class="card">
    <div class="label">Variants × States</div>
    <div class="grid">
      <div></div><div class="col-h">Default</div><div class="col-h">Hover</div><div class="col-h">Disabled</div>

      <div class="rowname">main</div>
      <div><button class="btn main"><i>💾</i> บันทึก</button></div>
      <div><button class="btn main hover"><i>💾</i> บันทึก</button></div>
      <div><button class="btn main disabled"><i>💾</i> บันทึก</button></div>

      <div class="rowname">outline</div>
      <div><button class="btn outline">ยกเลิก</button></div>
      <div><button class="btn outline hover">ยกเลิก</button></div>
      <div><button class="btn outline disabled">ยกเลิก</button></div>

      <div class="rowname">green</div>
      <div><button class="btn green"><i>🔍</i> ค้นหา</button></div>
      <div><button class="btn green hover"><i>🔍</i> ค้นหา</button></div>
      <div><button class="btn green disabled"><i>🔍</i> ค้นหา</button></div>

      <div class="rowname">red</div>
      <div><button class="btn red"><i>🗑</i> ลบ</button></div>
      <div><button class="btn red hover"><i>🗑</i> ลบ</button></div>
      <div><button class="btn red disabled"><i>🗑</i> ลบ</button></div>

      <div class="rowname">dark</div>
      <div><button class="btn dark">ล้าง</button></div>
      <div><button class="btn dark hover">ล้าง</button></div>
      <div><button class="btn dark disabled">ล้าง</button></div>
    </div>
  </div>

  <div class="card">
    <div class="label">Loading · Icon-only (list page) · Block</div>
    <div class="iconrow" style="margin-bottom:14px;">
      <button class="btn main"><span class="spin"></span> กำลังบันทึก</button>
      <button class="btn main icononly" title="ค้นหา">🔍</button>
      <button class="btn dark icononly" title="ล้าง">✖</button>
      <button class="btn main icononly" title="สร้าง">＋</button>
      <button class="btn green icononly" title="ดู">👁</button>
    </div>
    <button class="btn main" style="width:100%; justify-content:center;"><i>💾</i> บันทึก (block)</button>
    <div class="tip">หน้า list = ปุ่ม icon-only + tooltip (ไม่มี label) · หน้า form = ปุ่มมี label</div>
  </div>
</body>
</html>
